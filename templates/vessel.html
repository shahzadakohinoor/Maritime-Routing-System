<!DOCTYPE html>
<html>
<head>
    <title>Vessel Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>Vessel Registration</h1>

    <div class="card">
        <form action="/add-vessel" method="POST">
            <input type="text" name="vessel_name" placeholder="Vessel Name" required>
            <input type="number" name="dwt" placeholder="Deadweight Tonnage" required>
            <input type="number" step="0.1" name="draft" placeholder="Draft (m)" required>
            <input type="number" step="0.1" name="speed" placeholder="Speed (knots)" required>
            <button type="submit">Register Vessel</button>
        </form>
    </div>

    <a href="/">Back to Home</a>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
