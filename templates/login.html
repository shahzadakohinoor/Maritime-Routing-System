<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Oceanova</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="oceanova-body">

<div class="topbar">
    <div class="logo-area">
        <div class="logo-box">IME</div>
        <div class="brand-title">Integrated Maritime Exchange</div>
    </div>

    <div class="user-box">Oceanova Weather Routing</div>
</div>

<div class="container">

    <h1>Admin Login</h1>
    <p>Login to access the Oceanova Weather Routing Dashboard.</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="card">
        <form action="/login" method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">Login</button>

        </form>
    </div>

    <a href="/">Back to Home</a>

</div>

</body>
</html>
